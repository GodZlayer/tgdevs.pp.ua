<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeloCRM | PDV</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="shortcut icon" href="../favicon/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="../assets/pos-kJhtLnPR.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/mobile-CGD7LI3b.js">
  <link rel="modulepreload" crossorigin href="../assets/catalog-pricing-CTyFJyEE.js">
  <link rel="stylesheet" crossorigin href="../assets/mobile-CZwIl6AJ.css">
<script src="../demo-mock.js?v=20260620-admin-session"></script>
</head>
<body class="pos-shell bg-dark text-light overflow-hidden">
    <!-- Top Action Bar for POS -->
    <header class="bg-dark border-bottom border-secondary py-2 px-4 d-flex justify-content-between align-items-center position-sticky top-0 z-index-100">
        <div class="d-flex align-items-center gap-3">
            <img class="brand-wordmark brand-wordmark-pos" src="../logo/texto.png" alt="Lumix Ice">
            <span class="badge rounded-pill text-bg-secondary">PDV</span>
        </div>
        <div class="pos-actions d-flex gap-2">
            <button class="btn btn-sm btn-outline-secondary rounded-circle" id="theme-toggle" onclick="toggleTheme()" style="width: 38px; height: 38px;">
                <i data-lucide="sun" size="18" id="theme-icon"></i>
            </button>
            <button class="btn btn-sm btn-dark border border-secondary rounded-pill px-3" onclick="location.reload()"><i data-lucide="refresh-cw" size="14"></i> Limpar</button>
            <a href="../panel/index.html" class="btn btn-sm btn-outline-secondary rounded-pill px-3">Voltar ao painel</a>
        </div>
    </header>

    <main class="container-fluid p-3">
        <div class="row g-3" style="height: calc(100vh - 140px);">
            <!-- Left Side: Catalog -->
            <div class="col-12 col-lg-8 h-100">
                <div class="card bg-dark border border-secondary p-3 h-100 overflow-hidden">
                    <div class="input-group mb-3 border border-secondary rounded-3 overflow-hidden bg-dark">
                        <span class="input-group-text bg-transparent border-0 text-muted"><i data-lucide="search"></i></span>
                        <input type="text" id="product-search" class="form-control bg-transparent border-0 text-white p-2" placeholder="Buscar produto...">
                    </div>
                    <div class="row row-cols-2 row-cols-md-3 g-2 overflow-auto h-100" id="product-list">
                        <!-- Products -->
                    </div>
                </div>
            </div>
            
            <!-- Right Side: Cart Summary -->
            <div class="col-12 col-lg-4 h-100 d-none d-lg-flex flex-column gap-3">
                <div class="pos-cart-shell card bg-dark border border-secondary p-3 flex-grow-1 overflow-auto" id="cart-items">
                    <!-- Cart -->
                </div>
                <div class="pos-cart-summary card bg-primary bg-opacity-10 border-0 p-4 rounded-4">
                    <div class="pos-payment-grid mb-3" id="pos-payment-method">
                        <button type="button" class="btn btn-outline-light active" data-payment-method="pix">Pix</button>
                        <button type="button" class="btn btn-outline-light" data-payment-method="debit_card">Debito</button>
                        <button type="button" class="btn btn-outline-light" data-payment-method="credit_card">Credito</button>
                        <button type="button" class="btn btn-outline-light" data-payment-method="cash">Dinheiro</button>
                    </div>
                    <div class="d-flex justify-content-between mb-4 h3 fw-bold">
                        <span>Total</span>
                        <span id="total-price" class="text-primary">R$ 0,00</span>
                    </div>
                    <button class="btn btn-primary btn-lg w-100 py-3 rounded-pill shadow" id="checkout-btn" disabled>Finalizar Venda</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Nav for Mobile POS (to switch between catalog and cart) -->
    <nav class="bottom-nav bg-dark border-top border-secondary d-lg-none">
        <a href="#" class="nav-link active" onclick="showSection('catalog')">
            <i data-lucide="package"></i>
            <span>Produtos</span>
        </a>
        <a href="#" class="nav-link position-relative" onclick="showSection('cart')">
            <i data-lucide="shopping-cart"></i>
            <span>Carrinho</span>
            <span class="badge bg-primary rounded-pill position-absolute" style="top:5px; right:15px; font-size:10px;">0</span>
        </a>
        <a href="../panel/index.html" class="nav-link">
            <i data-lucide="arrow-left"></i>
            <span>Painel</span>
        </a>
    </nav>

    <script>
        // Simple switch for mobile POS
        function showSection(section) {
            // Logic to toggle between catalog view and cart view on mobile if needed
        }
    </script>
</body>
</html>
